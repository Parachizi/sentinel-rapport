var activeTab = 'corridors';
var filterRisk = 'all';
var searchVal = '';

function switchTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) {
        if (t.textContent.toLowerCase().indexOf(name) !== -1) t.classList.add('active');
    });
    renderPanel();
}

function filterAll() {
    searchVal = document.getElementById('searchInput').value.toLowerCase();
    renderPanel();
}

function setFilter(risk) {
    filterRisk = risk;
    renderPanel();
}

function renderPanel() {
    var el = document.getElementById('contentArea');
    if (activeTab === 'corridors') renderCorridors(el);
    else if (activeTab === 'generals') renderGenerals(el);
    else if (activeTab === 'agents') renderAgents(el);
    else if (activeTab === 'banques') renderBanques(el);
    else if (activeTab === 'liens-bg') renderLiensBG(el);
}

function scoreMatch(text) {
    if (!searchVal) return true;
    return text.toLowerCase().indexOf(searchVal) !== -1;
}

function volStr(v) {
    if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
    if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'K';
    return '$' + v;
}

function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('open');
    }
}

function renderCorridors(el) {
    var html = '<div class="section-title">Corridors Financiers (Israel &rarr; CI/CH)</div>';
    var filtered = CORRIDORS.filter(function(c) { return scoreMatch(c.from + ' ' + c.to + ' ' + c.channel + ' ' + c.from_country + ' ' + c.to_country); });
    if (filtered.length === 0) { html += '<div style="text-align:center;padding:2rem;color:#999;">Aucun resultat</div>'; el.innerHTML = html; return; }
    filtered.forEach(function(c) {
        var riskClass = c.risk === 'HAUT' ? 'haut' : c.risk === 'CRITIQUE' ? 'critique' : 'moyen';
        html += '<div class="card ' + riskClass + '" onclick='openModal(\"<h2>' + c.from + ' &rarr; ' + c.to + '</h2><table><tr><td>Volume</td><td>' + volStr(c.volume_usd) + '</td></tr><tr><td>Canal</td><td>' + c.channel + '</td></tr><tr><td>Distance</td><td>' + c.distance_km + ' km</td></tr><tr><td>Pays</td><td>' + c.from_country + ' &rarr; ' + c.to_country + '</td></tr><tr><td>Date</td><td>' + c.date + '</td></tr><tr><td>Risque</td><td><span class=\"risk-tag risk-' + c.risk + '\">' + c.risk + '</span></td></tr></table>\")>';
        html += '<div class="title">' + c.from + ' → ' + c.to + '</div>';
        html += '<div class="volume">' + volStr(c.volume_usd) + '</div>';
        html += '<div class="meta">' + c.channel + ' · ' + c.distance_km + ' km · <span class="risk-tag risk-' + c.risk + '">' + c.risk + '</span></div>';
        html += '</div>';
    });
    el.innerHTML = html;
}

function renderGenerals(el) {
    var html = '<div class="section-title">Generaux — Commandement militaire</div>';
    var gens = {};
    BG_LINKS.forEach(function(l) {
        if (!gens[l.general]) gens[l.general] = { rank: l.rank, banks: [], risks: [] };
        gens[l.general].banks.push(l.bank);
        gens[l.general].risks.push(l.risk);
    });
    var filtered = Object.keys(gens).filter(function(g) { return scoreMatch(g); });
    if (filtered.length === 0) { html += '<div style="text-align:center;padding:2rem;color:#999;">Aucun resultat</div>'; el.innerHTML = html; return; }
    filtered.forEach(function(g) {
        var info = gens[g];
        var maxRisk = info.risks.indexOf('CRITIQUE') !== -1 ? 'CRITIQUE' : info.risks.indexOf('HAUT') !== -1 ? 'HAUT' : 'MOYEN';
        var riskClass = maxRisk === 'CRITIQUE' ? 'critique' : maxRisk === 'HAUT' ? 'haut' : 'moyen';
        html += '<div class="card ' + riskClass + '" onclick='openModal(\"<h2>' + g + '</h2><table><tr><td>Grade</td><td>' + info.rank + '</td></tr><tr><td>Banques liees</td><td>' + info.banks.length + '</td></tr><tr><td>Risque max</td><td><span class=\"risk-tag risk-' + maxRisk + '\">' + maxRisk + '</span></td></tr></table><div style=\"margin-top:0.6rem;font-size:0.8rem;\"><strong>Banques:</strong><br>' + info.banks.join(', ') + '</div>\")>';
        html += '<div class="title">' + g + '</div>';
        html += '<div class="sub">' + info.rank + '</div>';
        html += '<div class="meta">' + info.banks.length + ' banques liees · <span class="risk-tag risk-' + maxRisk + '">' + maxRisk + '</span></div>';
        html += '</div>';
    });
    el.innerHTML = html;
}

function renderAgents(el) {
    var html = '<div class="section-title">Reseaux Agents — Financement terrain</div>';
    var nets = AGENT_NETS;
    var filtered = Object.keys(nets).filter(function(n) { return scoreMatch(n + ' ' + nets[n].region); });
    if (filtered.length === 0) { html += '<div style="text-align:center;padding:2rem;color:#999;">Aucun resultat</div>'; el.innerHTML = html; return; }
    filtered.forEach(function(n) {
        var info = nets[n];
        html += '<div class="card" onclick='openModal(\"<h2>' + n + '</h2><table><tr><td>Region</td><td>' + info.region + '</td></tr><tr><td>Banques liees</td><td>' + info.banks.length + '</td></tr></table><div style=\"margin-top:0.6rem;font-size:0.8rem;\"><strong>Banques:</strong><br>' + info.banks.join(', ') + '</div>\")>';
        html += '<div class="title">' + n + '</div>';
        html += '<div class="sub">' + info.region + '</div>';
        html += '<div class="meta">' + info.banks.length + ' banques</div>';
        html += '</div>';
    });
    el.innerHTML = html;
}

function renderBanques(el) {
    var html = '<div class="section-title">Banques Israeliennes — Liens & volumes</div>';
    var banks = {};
    CORRIDORS.forEach(function(c) {
        if (!banks[c.from]) banks[c.from] = { from_country: c.from_country, count: 0, volume: 0, channels: {}, partners: [] };
        banks[c.from].count++;
        banks[c.from].volume += c.volume_usd;
        banks[c.from].channels[c.channel] = (banks[c.from].channels[c.channel] || 0) + 1;
        if (banks[c.from].partners.indexOf(c.to) === -1) banks[c.from].partners.push(c.to);
    });
    var filtered = Object.keys(banks).filter(function(b) { return scoreMatch(b); });
    if (filtered.length === 0) { html += '<div style="text-align:center;padding:2rem;color:#999;">Aucun resultat</div>'; el.innerHTML = html; return; }
    filtered.forEach(function(b) {
        var info = banks[b];
        html += '<div class="card" onclick='openModal(\"<h2>' + b + '</h2><table><tr><td>Volume total</td><td>' + volStr(info.volume) + '</td></tr><tr><td>Transactions</td><td>' + info.count + '</td></tr><tr><td>Pays</td><td>' + info.from_country + '</td></tr><tr><td>Canaux</td><td>' + Object.keys(info.channels).join(', ') + '</td></tr></table><div style=\"margin-top:0.6rem;font-size:0.8rem;\"><strong>Partenaires:</strong><br>' + info.partners.join(', ') + '</div>\")>';
        html += '<div class="title">' + b + '</div>';
        html += '<div class="volume">' + volStr(info.volume) + '</div>';
        html += '<div class="meta">' + info.count + ' transactions · ' + Object.keys(info.channels).join(', ') + '</div>';
        html += '</div>';
    });
    el.innerHTML = html;
}

function renderLiensBG(el) {
    var html = '<div class="section-title">Liens Banquiers-Generaux (BG)</div>';
    html += '<div class="filter-row"><button class="active" onclick="setFilter(\'all\')" id="f-all">Tous</button><button onclick="setFilter(\'CRITIQUE\')" id="f-CRITIQUE">Critique</button><button onclick="setFilter(\'HAUT\')" id="f-HAUT">Haut</button><button onclick="setFilter(\'MOYEN\')" id="f-MOYEN">Moyen</button></div>';
    var filtered = BG_LINKS.filter(function(l) {
        var matchRisk = filterRisk === 'all' || l.risk === filterRisk;
        var matchSearch = scoreMatch(l.general + ' ' + l.bank + ' ' + l.rank + ' ' + l.city);
        return matchRisk && matchSearch;
    });
    if (filtered.length === 0) { html += '<div style="text-align:center;padding:2rem;color:#999;">Aucun resultat</div>'; el.innerHTML = html; return; }
    filtered.forEach(function(l) {
        var riskClass = l.risk === 'CRITIQUE' ? 'critique' : l.risk === 'HAUT' ? 'haut' : 'moyen';
        html += '<div class="card ' + riskClass + '" onclick='openModal(\"<h2>' + l.general + '</h2><table><tr><td>Grade</td><td>' + l.rank + '</td></tr><tr><td>Banque</td><td>' + l.bank + '</td></tr><tr><td>Distance</td><td>' + l.distance_km + ' km</td></tr><tr><td>Ville</td><td>' + l.city + '</td></tr><tr><td>Risque</td><td><span class=\"risk-tag risk-' + l.risk + '\">' + l.risk + '</span></td></tr></table>\")>';
        html += '<div class="title">' + l.general + ' → ' + l.bank + '</div>';
        html += '<div class="sub">' + l.rank + ' · ' + l.city + '</div>';
        html += '<div class="meta">' + l.distance_km + ' km · <span class="risk-tag risk-' + l.risk + '">' + l.risk + '</span></div>';
        html += '</div>';
    });
    el.innerHTML = html;
}
